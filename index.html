<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚾ Pitch Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap');
 
  :root {
    --green: #1a3a1a;
    --green-mid: #2a5c2a;
    --green-light: #3d7a3d;
    --dirt: #c4854a;
    --dirt-light: #e0a96d;
    --cream: #f5edd8;
    --chalk: #f0ebe0;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #d4af37;
    --gold-light: #f0cc5a;
    --navy: #0d1f3c;
    --sky: #4a90c4;
    --white: #ffffff;
    --warning: #e67e22;
    --danger: #c0392b;
    --text-dark: #1a1a1a;
    --text-mid: #444;
    --shadow: 0 4px 20px rgba(0,0,0,0.35);
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
 
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--green);
    min-height: 100vh;
    color: var(--cream);
    background-image:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(61,122,61,0.6) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
  }
 
  /* HEADER */
  .header {
    background: var(--navy);
    padding: 10px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }
  .header-logo span { color: var(--cream); font-size: 1rem; display: block; letter-spacing: 4px; }
  .header-actions { display: flex; gap: 8px; }
  .btn-sm {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); }
  .btn-outline:active { background: var(--gold); color: var(--navy); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:active { background: var(--red-light); }
 
  /* SCREENS */
  .screen { display: none; padding: 0 0 100px; }
  .screen.active { display: block; }
 
  /* SETUP SCREEN */
  .setup-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-align: center;
  }
  .field-group { margin-bottom: 16px; }
  .field-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dirt-light);
    margin-bottom: 6px;
    display: block;
  }
  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--gold); }
  .field-input::placeholder { color: rgba(245,237,216,0.3); }
 
  .limit-row { display: flex; gap: 10px; align-items: center; }
  .limit-row .field-input { flex: 1; }
  .limit-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--cream);
    background: var(--green-mid);
    padding: 10px 14px;
    border-radius: 8px;
    white-space: nowrap;
  }
 
  .btn-start {
    width: 100%;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    border: none;
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.15s;
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
  }
  .btn-start:active { transform: scale(0.97); background: var(--gold-light); }
 
  /* SAVED GAMES */
  .saved-section { margin-top: 28px; }
  .saved-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dirt-light);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .saved-game {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .saved-game:active { background: rgba(255,255,255,0.1); }
  .saved-game-info { flex: 1; }
  .saved-game-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; }
  .saved-game-meta { font-size: 0.78rem; color: rgba(245,237,216,0.5); margin-top: 2px; }
  .saved-game-pitches {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--gold);
    margin: 0 12px;
  }
  .saved-game-delete {
    background: none; border: none; color: rgba(255,255,255,0.25);
    font-size: 1.1rem; cursor: pointer; padding: 4px 6px;
    transition: color 0.15s;
  }
  .saved-game-delete:active { color: var(--red-light); }
 
  /* TRACKER SCREEN */
  /* Count Display */
  .count-bar {
    background: var(--navy);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid var(--green-mid);
  }
  .count-pitcher {
    flex: 1;
    min-width: 0;
  }
  .count-pitcher-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .count-pitcher-date { font-size: 0.72rem; color: rgba(245,237,216,0.45); letter-spacing: 1px; }
  .count-bso {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .bso-group { text-align: center; }
  .bso-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,237,216,0.4);
    display: block;
    margin-bottom: 3px;
  }
  .bso-dots { display: flex; gap: 4px; }
  .bso-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: transparent;
    transition: all 0.2s;
  }
  .bso-dot.active-b { background: var(--sky); border-color: var(--sky); }
  .bso-dot.active-s { background: var(--gold); border-color: var(--gold); }
  .bso-dot.active-o { background: var(--red); border-color: var(--red); }
 
  .count-total {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--green-mid);
    border-radius: 8px;
    padding: 6px 12px;
    min-width: 60px;
  }
  .count-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--cream);
    transition: color 0.3s;
  }
  .count-num.warn { color: var(--warning); }
  .count-num.danger { color: var(--red-light); }
  .count-num.over { color: var(--red-light); animation: pulse 0.8s infinite; }
  .count-label { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,237,216,0.4); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
 
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
 
  /* Pitch Limit Warning Banner */
  .warning-banner {
    background: var(--warning);
    color: white;
    text-align: center;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    display: none;
  }
  .warning-banner.show { display: block; }
  .warning-banner.over { background: var(--red); }
 
  /* Inning control */
  .inning-bar {
    background: rgba(0,0,0,0.2);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .inning-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--cream);
  }
  .inning-ctrl { display: flex; gap: 8px; align-items: center; }
  .inning-btn {
    background: var(--green-mid);
    border: none;
    color: var(--cream);
    font-size: 1.1rem;
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .inning-btn:active { background: var(--green-light); }
  .inning-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--gold);
    min-width: 30px;
    text-align: center;
  }
 
  /* Pitch Buttons */
  .pitch-section { padding: 14px 16px 8px; }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dirt-light);
    margin-bottom: 8px;
  }
  .pitch-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .pitch-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 10px 4px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.2;
  }
  .pitch-btn[data-type="Fastball"]  { background: rgba(224,74,74,0.15); border-color: rgba(224,74,74,0.4); color: #e84a4a; }
  .pitch-btn[data-type="Curveball"] { background: rgba(100,160,220,0.15); border-color: rgba(100,160,220,0.4); color: #64a0dc; }
  .pitch-btn[data-type="Slider"]    { background: rgba(212,175,55,0.15); border-color: rgba(212,175,55,0.4); color: var(--gold); }
  .pitch-btn[data-type="Changeup"]  { background: rgba(100,200,140,0.15); border-color: rgba(100,200,140,0.4); color: #64c88c; }
  .pitch-btn[data-type="Other"]     { background: rgba(160,130,200,0.15); border-color: rgba(160,130,200,0.4); color: #a082c8; }
  .pitch-btn.selected { filter: brightness(1.4); transform: scale(1.04); box-shadow: 0 0 12px currentColor; }
  .pitch-btn:active { transform: scale(0.95); }
 
  .result-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .result-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 11px 4px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .result-btn[data-result="Ball"]     { background: rgba(74,144,196,0.15); border-color: rgba(74,144,196,0.4); color: var(--sky); }
  .result-btn[data-result="Strike"]   { background: rgba(212,175,55,0.15); border-color: rgba(212,175,55,0.4); color: var(--gold); }
  .result-btn[data-result="Foul"]     { background: rgba(220,180,80,0.12); border-color: rgba(220,180,80,0.3); color: #deb44a; }
  .result-btn[data-result="In Play"]  { background: rgba(60,180,80,0.15); border-color: rgba(60,180,80,0.4); color: #3cb850; }
  .result-btn.selected { filter: brightness(1.4); transform: scale(1.03); box-shadow: 0 0 10px currentColor; }
  .result-btn:active { transform: scale(0.95); }
 
  /* LOG PITCH button */
  .log-wrap { padding: 10px 16px 0; }
  .btn-log {
    width: 100%;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    border: none;
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 15px rgba(212,175,55,0.3);
  }
  .btn-log:disabled { background: rgba(212,175,55,0.25); color: rgba(13,31,60,0.4); box-shadow: none; cursor: not-allowed; }
  .btn-log:not(:disabled):active { transform: scale(0.97); background: var(--gold-light); }
 
  /* UNDO ROW */
  .undo-row { padding: 8px 16px 0; text-align: right; }
  .btn-undo {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-undo:active { color: var(--cream); border-color: rgba(255,255,255,0.4); }
 
  /* STATS PANEL */
  .stats-panel { padding: 14px 16px 0; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .stat-card {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px;
  }
  .stat-card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dirt-light);
    margin-bottom: 8px;
  }
  .breakdown-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .breakdown-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: rgba(245,237,216,0.7);
  }
  .breakdown-bar-wrap { flex: 1; margin: 0 8px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .breakdown-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .breakdown-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    min-width: 20px;
    text-align: right;
  }
  .bar-fb { background: #e84a4a; }
  .bar-cb { background: #64a0dc; }
  .bar-sl { background: var(--gold); }
  .bar-ch { background: #64c88c; }
  .bar-ot { background: #a082c8; }
  .bar-ball { background: var(--sky); }
  .bar-strike { background: var(--gold); }
  .bar-foul { background: #deb44a; }
  .bar-inplay { background: #3cb850; }
 
  /* Inning breakdown */
  .inning-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .inning-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dirt-light);
    padding: 4px 6px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .inning-table td {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    padding: 5px 6px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .inning-table tr:last-child td { border-bottom: none; }
  .inning-table .current-row td { color: var(--gold); }
  .pitch-log-section { padding: 12px 16px 0; }
  .log-list {
    max-height: 180px;
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 6px 4px;
  }
  .log-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.78rem;
  }
  .log-item:last-child { border-bottom: none; }
  .log-num { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: rgba(245,237,216,0.3); min-width: 24px; }
  .log-inning { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.65rem; color: rgba(245,237,216,0.35); min-width: 20px; }
  .log-type { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; flex: 1; }
  .log-result { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
  .res-ball { background: rgba(74,144,196,0.2); color: var(--sky); }
  .res-strike { background: rgba(212,175,55,0.2); color: var(--gold); }
  .res-foul { background: rgba(222,180,74,0.2); color: #deb44a; }
  .res-inplay { background: rgba(60,184,80,0.2); color: #3cb850; }
 
  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--navy);
    border-top: 2px solid var(--green-mid);
    display: flex;
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: rgba(245,237,216,0.35);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 4px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
 
  /* TABS */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
 
  /* LOG SCREEN */
  .log-screen-list { padding: 16px; }
  .log-game-card {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .log-game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: rgba(0,0,0,0.15);
    cursor: pointer;
  }
  .log-game-header-info { flex: 1; }
  .log-game-pitcher { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; }
  .log-game-date { font-size: 0.72rem; color: rgba(245,237,216,0.4); }
  .log-game-total {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    margin: 0 12px;
    line-height: 1;
  }
  .log-game-body { padding: 10px 14px; display: none; }
  .log-game-body.open { display: block; }
 
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(245,237,216,0.3);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }
  .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 12px; }
 
  /* Flash animation for pitch log */
  @keyframes flashIn {
    0% { background: rgba(212,175,55,0.3); }
    100% { background: transparent; }
  }
  .log-item.new { animation: flashIn 0.6s ease-out; }
 
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>
 
<div class="header">
  <div class="header-logo">
    ⚾ Pitch<span>TRACKER</span>
  </div>
  <div class="header-actions" id="headerActions">
    <button class="btn-sm btn-outline" onclick="goSetup()">+ New Game</button>
  </div>
</div>
 
<!-- SETUP SCREEN -->
<div class="screen active" id="screenSetup">
  <div class="setup-wrap">
    <div class="setup-title">Game Setup</div>
 
    <div class="field-group">
      <label class="field-label">Pitcher Name</label>
      <input class="field-input" id="pitcherName" type="text" placeholder="e.g. Jackson, T." maxlength="40" />
    </div>
    <div class="field-group">
      <label class="field-label">Game Date</label>
      <input class="field-input" id="gameDate" type="date" />
    </div>
    <div class="field-group">
      <label class="field-label">Pitch Limit</label>
      <div class="limit-row">
        <input class="field-input" id="pitchLimit" type="number" min="1" max="200" placeholder="e.g. 75" />
        <div class="limit-badge">pitches</div>
      </div>
    </div>
 
    <button class="btn-start" onclick="startGame()">Start Tracking</button>
 
    <div class="saved-section" id="savedSection">
      <div class="saved-title">Saved Games</div>
      <div id="savedGamesList"></div>
    </div>
  </div>
</div>
 
<!-- TRACKER SCREEN -->
<div class="screen" id="screenTracker">
 
  <!-- Count Bar -->
  <div class="count-bar">
    <div class="count-pitcher">
      <div class="count-pitcher-name" id="dispName">—</div>
      <div class="count-pitcher-date" id="dispDate">—</div>
    </div>
    <div class="count-bso">
      <div class="bso-group">
        <span class="bso-label">B</span>
        <div class="bso-dots" id="dotsBall">
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
        </div>
      </div>
      <div class="bso-group">
        <span class="bso-label">S</span>
        <div class="bso-dots" id="dotsStrike">
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
        </div>
      </div>
      <div class="bso-group">
        <span class="bso-label">O</span>
        <div class="bso-dots" id="dotsOut">
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
          <div class="bso-dot"></div>
        </div>
      </div>
    </div>
    <div class="count-total">
      <div class="count-num" id="totalCount">0</div>
      <div class="count-label">Pitches</div>
    </div>
  </div>
 
  <!-- Warning Banner -->
  <div class="warning-banner" id="warningBanner"></div>
 
  <!-- Inning -->
  <div class="inning-bar">
    <div class="inning-label">Inning</div>
    <div class="inning-ctrl">
      <button class="inning-btn" onclick="changeInning(-1)">−</button>
      <div class="inning-num" id="inningNum">1</div>
      <button class="inning-btn" onclick="changeInning(1)">+</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-sm btn-outline" onclick="newAB()" style="font-size:0.65rem;">New AB</button>
    </div>
  </div>
 
  <!-- Tabs -->
  <div class="bottom-nav" id="trackerNav">
    <button class="nav-btn active" onclick="switchTab('tabLog')" id="navLog">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12h2M20 12h2M12 2v2M12 20v2"/></svg>
      Log
    </button>
    <button class="nav-btn" onclick="switchTab('tabStats')" id="navStats">
      <svg viewBox="0 0 24 24"><rect x="3" y="14" width="4" height="7"/><rect x="10" y="9" width="4" height="12"/><rect x="17" y="4" width="4" height="17"/></svg>
      Stats
    </button>
    <button class="nav-btn" onclick="switchTab('tabHistory')" id="navHistory">
      <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      Log
    </button>
    <button class="nav-btn" onclick="goSetup()">
      <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      Menu
    </button>
  </div>
 
  <!-- TAB: LOG PITCH -->
  <div class="tab-panel active" id="tabLog">
    <div class="pitch-section">
      <div class="section-label">Pitch Type</div>
      <div class="pitch-grid">
        <button class="pitch-btn" data-type="Fastball" onclick="selectType(this)">FB</button>
        <button class="pitch-btn" data-type="Curveball" onclick="selectType(this)">CB</button>
        <button class="pitch-btn" data-type="Slider" onclick="selectType(this)">SL</button>
        <button class="pitch-btn" data-type="Changeup" onclick="selectType(this)">CH</button>
        <button class="pitch-btn" data-type="Other" onclick="selectType(this)">OT</button>
      </div>
    </div>
 
    <div class="pitch-section" style="padding-top:4px;">
      <div class="section-label">Result</div>
      <div class="result-grid">
        <button class="result-btn" data-result="Ball" onclick="selectResult(this)">Ball</button>
        <button class="result-btn" data-result="Strike" onclick="selectResult(this)">Strike</button>
        <button class="result-btn" data-result="Foul" onclick="selectResult(this)">Foul</button>
        <button class="result-btn" data-result="In Play" onclick="selectResult(this)">In Play</button>
      </div>
    </div>
 
    <div class="log-wrap">
      <button class="btn-log" id="btnLog" onclick="logPitch()" disabled>Log Pitch</button>
    </div>
 
    <div class="undo-row">
      <button class="btn-undo" onclick="undoPitch()">↩ Undo Last</button>
    </div>
 
    <div class="pitch-log-section">
      <div class="section-label">This Game</div>
      <div class="log-list" id="pitchLogList"></div>
    </div>
  </div>
 
  <!-- TAB: STATS -->
  <div class="tab-panel" id="tabStats">
    <div class="stats-panel">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-title">By Type</div>
          <div id="typeBreakdown"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title">By Result</div>
          <div id="resultBreakdown"></div>
        </div>
      </div>
      <div class="stat-card" style="margin-bottom:10px;">
        <div class="stat-card-title">Pitches By Inning</div>
        <table class="inning-table" id="inningTable">
          <thead><tr><th>INN</th><th>Pitches</th><th>Balls</th><th>Strikes</th><th>Fouls</th><th>In Play</th></tr></thead>
          <tbody id="inningTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
 
  <!-- TAB: HISTORY (pitch list) -->
  <div class="tab-panel" id="tabHistory">
    <div class="log-screen-list" id="pitchLogFull"></div>
  </div>
 
</div>
 
<!-- LOGS SCREEN -->
<div class="screen" id="screenLogs">
  <div class="log-screen-list" id="allGamesList"></div>
</div>
 
<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
let game = null; // current game object
let selectedType = null;
let selectedResult = null;
let balls = 0, strikes = 0, outs = 0;
 
// game: { id, pitcher, date, limit, pitches: [{num, inning, type, result}], inning }
 
// ─── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('gameDate').value = d.toISOString().split('T')[0];
  renderSavedGames();
});
 
// ─── SETUP ──────────────────────────────────────────────────────────────────
function goSetup() {
  saveCurrentGame();
  showScreen('screenSetup');
  renderSavedGames();
}
 
function startGame() {
  const name = document.getElementById('pitcherName').value.trim();
  const date = document.getElementById('gameDate').value;
  const limit = parseInt(document.getElementById('pitchLimit').value) || 0;
 
  if (!name) { alert('Enter a pitcher name.'); return; }
  if (!date) { alert('Select a game date.'); return; }
 
  game = {
    id: Date.now().toString(),
    pitcher: name,
    date: date,
    limit: limit,
    pitches: [],
    inning: 1
  };
  balls = 0; strikes = 0; outs = 0;
  selectedType = null; selectedResult = null;
 
  showScreen('screenTracker');
  renderAll();
  switchTab('tabLog');
}
 
function loadGame(id) {
  saveCurrentGame();
  const saved = loadAllGames();
  const g = saved.find(g => g.id === id);
  if (!g) return;
  game = g;
  balls = 0; strikes = 0; outs = 0;
  selectedType = null; selectedResult = null;
  showScreen('screenTracker');
  renderAll();
  switchTab('tabLog');
}
 
// ─── SCREEN / TAB ───────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
 
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#trackerNav .nav-btn').forEach(b => b.classList.remove('active'));
  const map = { tabLog: 'navLog', tabStats: 'navStats', tabHistory: 'navHistory' };
  if (map[id]) document.getElementById(map[id]).classList.add('active');
  if (id === 'tabStats') renderStats();
  if (id === 'tabHistory') renderFullLog();
}
 
// ─── SELECTION ───────────────────────────────────────────────────────────────
function selectType(btn) {
  document.querySelectorAll('.pitch-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedType = btn.dataset.type;
  checkLogReady();
}
 
function selectResult(btn) {
  document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedResult = btn.dataset.result;
  checkLogReady();
}
 
function checkLogReady() {
  document.getElementById('btnLog').disabled = !(selectedType && selectedResult);
}
 
// ─── LOG PITCH ───────────────────────────────────────────────────────────────
function logPitch() {
  if (!selectedType || !selectedResult || !game) return;
 
  const pitch = {
    num: game.pitches.length + 1,
    inning: game.inning,
    type: selectedType,
    result: selectedResult
  };
  game.pitches.push(pitch);
 
  // Update live count (simple)
  if (selectedResult === 'Ball') {
    balls = Math.min(balls + 1, 4);
    if (balls >= 4) { balls = 0; strikes = 0; } // walk — reset
  } else if (selectedResult === 'Strike') {
    strikes = Math.min(strikes + 1, 3);
    if (strikes >= 3) { strikes = 0; balls = 0; } // K — reset
  } else if (selectedResult === 'Foul') {
    if (strikes < 2) strikes++;
  } else if (selectedResult === 'In Play') {
    balls = 0; strikes = 0; // reset on contact
  }
 
  saveCurrentGame();
  renderAll();
 
  // reset selection
  selectedType = null; selectedResult = null;
  document.querySelectorAll('.pitch-btn,.result-btn').forEach(b => b.classList.remove('selected'));
  checkLogReady();
}
 
function undoPitch() {
  if (!game || game.pitches.length === 0) return;
  game.pitches.pop();
  balls = 0; strikes = 0; outs = 0;
  saveCurrentGame();
  renderAll();
}
 
function newAB() {
  balls = 0; strikes = 0;
  renderCountDots();
}
 
function changeInning(dir) {
  if (!game) return;
  game.inning = Math.max(1, game.inning + dir);
  saveCurrentGame();
  document.getElementById('inningNum').textContent = game.inning;
}
 
// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  if (!game) return;
  renderHeader();
  renderCountDots();
  renderTotalCount();
  renderWarning();
  renderPitchLog();
  document.getElementById('inningNum').textContent = game.inning;
}
 
function renderHeader() {
  document.getElementById('dispName').textContent = game.pitcher;
  const d = new Date(game.date + 'T12:00:00');
  document.getElementById('dispDate').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
 
function renderCountDots() {
  const bd = document.getElementById('dotsBall').querySelectorAll('.bso-dot');
  bd.forEach((d, i) => { d.classList.toggle('active-b', i < balls); });
  const sd = document.getElementById('dotsStrike').querySelectorAll('.bso-dot');
  sd.forEach((d, i) => { d.classList.toggle('active-s', i < strikes); });
  const od = document.getElementById('dotsOut').querySelectorAll('.bso-dot');
  od.forEach((d, i) => { d.classList.toggle('active-o', i < outs); });
}
 
function renderTotalCount() {
  const total = game.pitches.length;
  const el = document.getElementById('totalCount');
  el.textContent = total;
  const limit = game.limit;
  el.classList.remove('warn', 'danger', 'over');
  if (limit > 0) {
    const pct = total / limit;
    if (total >= limit) el.classList.add('over');
    else if (pct >= 0.9) el.classList.add('danger');
    else if (pct >= 0.75) el.classList.add('warn');
  }
}
 
function renderWarning() {
  const banner = document.getElementById('warningBanner');
  const total = game.pitches.length;
  const limit = game.limit;
  if (!limit) { banner.classList.remove('show'); return; }
  if (total >= limit) {
    banner.textContent = `⚠️ PITCH LIMIT REACHED — ${total}/${limit} pitches thrown`;
    banner.className = 'warning-banner show over';
  } else if (total >= Math.round(limit * 0.9)) {
    const rem = limit - total;
    banner.textContent = `⚠️ Approaching limit — ${rem} pitches remaining`;
    banner.className = 'warning-banner show';
  } else {
    banner.classList.remove('show');
  }
}
 
function renderPitchLog() {
  const list = document.getElementById('pitchLogList');
  list.innerHTML = '';
  const pitches = [...game.pitches].reverse();
  pitches.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'log-item' + (i === 0 ? ' new' : '');
    const resClass = { Ball: 'res-ball', Strike: 'res-strike', Foul: 'res-foul', 'In Play': 'res-inplay' }[p.result] || '';
    el.innerHTML = `
      <span class="log-num">${p.num}</span>
      <span class="log-inning">I${p.inning}</span>
      <span class="log-type">${p.type}</span>
      <span class="log-result ${resClass}">${p.result}</span>
    `;
    list.appendChild(el);
  });
}
 
function renderStats() {
  if (!game) return;
  const pitches = game.pitches;
  const total = pitches.length || 1;
 
  // Type breakdown
  const types = ['Fastball', 'Curveball', 'Slider', 'Changeup', 'Other'];
  const barClasses = { Fastball: 'bar-fb', Curveball: 'bar-cb', Slider: 'bar-sl', Changeup: 'bar-ch', Other: 'bar-ot' };
  const labels = { Fastball: 'FB', Curveball: 'CB', Slider: 'SL', Changeup: 'CH', Other: 'OT' };
  const typeEl = document.getElementById('typeBreakdown');
  typeEl.innerHTML = types.map(t => {
    const c = pitches.filter(p => p.type === t).length;
    const pct = Math.round(c / total * 100);
    return `<div class="breakdown-row">
      <span class="breakdown-label">${labels[t]}</span>
      <div class="breakdown-bar-wrap"><div class="breakdown-bar ${barClasses[t]}" style="width:${pct}%"></div></div>
      <span class="breakdown-count">${c}</span>
    </div>`;
  }).join('');
 
  // Result breakdown
  const results = ['Ball', 'Strike', 'Foul', 'In Play'];
  const resClasses = { Ball: 'bar-ball', Strike: 'bar-strike', Foul: 'bar-foul', 'In Play': 'bar-inplay' };
  const resEl = document.getElementById('resultBreakdown');
  resEl.innerHTML = results.map(r => {
    const c = pitches.filter(p => p.result === r).length;
    const pct = Math.round(c / total * 100);
    return `<div class="breakdown-row">
      <span class="breakdown-label">${r}</span>
      <div class="breakdown-bar-wrap"><div class="breakdown-bar ${resClasses[r]}" style="width:${pct}%"></div></div>
      <span class="breakdown-count">${c}</span>
    </div>`;
  }).join('');
 
  // Inning table
  const innings = {};
  pitches.forEach(p => {
    if (!innings[p.inning]) innings[p.inning] = [];
    innings[p.inning].push(p);
  });
  const inningNums = Object.keys(innings).map(Number).sort((a,b) => a-b);
  const tbody = document.getElementById('inningTableBody');
  tbody.innerHTML = inningNums.map(n => {
    const ps = innings[n];
    const balls = ps.filter(p => p.result === 'Ball').length;
    const strikes = ps.filter(p => p.result === 'Strike').length;
    const fouls = ps.filter(p => p.result === 'Foul').length;
    const inplay = ps.filter(p => p.result === 'In Play').length;
    const isCurrentRow = n === game.inning ? ' class="current-row"' : '';
    return `<tr${isCurrentRow}><td>${n}</td><td>${ps.length}</td><td>${balls}</td><td>${strikes}</td><td>${fouls}</td><td>${inplay}</td></tr>`;
  }).join('') || '<tr><td colspan="6" style="color:rgba(245,237,216,0.3);padding:10px;font-size:0.8rem;font-family:\'Barlow Condensed\',sans-serif;">No pitches yet</td></tr>';
}
 
function renderFullLog() {
  const el = document.getElementById('pitchLogFull');
  if (!game || game.pitches.length === 0) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">⚾</span>No pitches logged yet.</div>';
    return;
  }
  el.innerHTML = '';
  const container = document.createElement('div');
  container.style.cssText = 'background:rgba(0,0,0,0.2);border-radius:10px;overflow:hidden;';
  game.pitches.forEach(p => {
    const d = document.createElement('div');
    d.className = 'log-item';
    const resClass = { Ball: 'res-ball', Strike: 'res-strike', Foul: 'res-foul', 'In Play': 'res-inplay' }[p.result] || '';
    d.innerHTML = `<span class="log-num">${p.num}</span><span class="log-inning">I${p.inning}</span><span class="log-type">${p.type}</span><span class="log-result ${resClass}">${p.result}</span>`;
    container.appendChild(d);
  });
  el.appendChild(container);
}
 
// ─── SAVED GAMES ─────────────────────────────────────────────────────────────
function loadAllGames() {
  try { return JSON.parse(localStorage.getItem('pitchTrackerGames') || '[]'); } catch { return []; }
}
 
function saveCurrentGame() {
  if (!game) return;
  const all = loadAllGames();
  const idx = all.findIndex(g => g.id === game.id);
  if (idx >= 0) all[idx] = game;
  else all.push(game);
  localStorage.setItem('pitchTrackerGames', JSON.stringify(all));
}
 
function deleteGame(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this game log?')) return;
  let all = loadAllGames().filter(g => g.id !== id);
  localStorage.setItem('pitchTrackerGames', JSON.stringify(all));
  if (game && game.id === id) game = null;
  renderSavedGames();
}
 
function renderSavedGames() {
  const all = loadAllGames().sort((a,b) => b.id - a.id);
  const el = document.getElementById('savedGamesList');
  const sec = document.getElementById('savedSection');
  if (all.length === 0) {
    sec.style.display = 'none';
    return;
  }
  sec.style.display = 'block';
  el.innerHTML = all.map(g => {
    const d = new Date(g.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const limitStr = g.limit ? ` · Limit: ${g.limit}` : '';
    return `<div class="saved-game" onclick="loadGame('${g.id}')">
      <div class="saved-game-info">
        <div class="saved-game-name">${g.pitcher}</div>
        <div class="saved-game-meta">${dateStr}${limitStr}</div>
      </div>
      <div class="saved-game-pitches">${g.pitches.length}</div>
      <button class="saved-game-delete" onclick="deleteGame('${g.id}', event)">✕</button>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
